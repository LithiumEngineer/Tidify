target-version = "py39"
line-length = 100

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
]
ignore = [
  "E501",  # line too long (handled by formatter)
  "UP006", # use list instead of List (keeping for py39 compat)
  "UP035", # typing.List deprecated (keeping for py39 compat)
  "UP045", # use X | None (keeping for py39 compat)
  "E402",  # module level import not at top (test files need sys.path)
]

[format]
quote-style = "double"
indent-style = "space"
